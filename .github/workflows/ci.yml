name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: fmt
        run: cargo fmt --all --check
      - name: build
        run: cargo build
      - name: test
        run: cargo test
      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
